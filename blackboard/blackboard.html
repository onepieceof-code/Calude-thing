<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackboard</title>
  <link rel="icon" type="image/svg+xml" href="blackboard_favicon.svg">

  <style>
    /* ============================================================
       1. GLOBAL RESET + PAGE LOOK
       Distraction-free, fullscreen, classic dark chalkboard.
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;              /* no scrollbars, true fullscreen */
    }

    body {
      /* Dark slate-green "chalkboard" with a soft vignette for depth */
      background-color: #1b2620;
      background-image: radial-gradient(
        circle at 50% 40%,
        #233129 0%,
        #1b2620 55%,
        #141d18 100%
      );
    }

    /* ============================================================
       2. THE DRAWING CANVAS
       Fills the whole window. The dark background shows through,
       so the eraser can simply "remove" chalk back to the board.
       ============================================================ */
    #board {
      display: block;
      position: fixed;
      inset: 0;                      /* top/right/bottom/left = 0 */
      cursor: crosshair;             /* precise drawing feel */
      touch-action: none;            /* stops the page from scrolling while drawing */
    }

    /* ============================================================
       3. MINIMAL FLOATING TOOLBAR
       Just three controls, tucked at the bottom-center.
       Quiet by default, brightens on hover.
       ============================================================ */
    #toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 16px;
      background: rgba(20, 29, 24, 0.55);
      border: 1px solid rgba(236, 235, 227, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0.55;
      transition: opacity 0.2s ease;
    }
    #toolbar:hover {
      opacity: 1;
    }

    /* Each tool button */
    .tool {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: #c9cdc6;               /* soft chalk grey */
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .tool:hover {
      background: rgba(236, 235, 227, 0.08);
      color: #ecebe3;
    }
    .tool svg {
      width: 22px;
      height: 22px;
    }

    /* The currently selected tool (pencil OR eraser) */
    .tool.active {
      background: rgba(236, 235, 227, 0.16);
      color: #ecebe3;
    }

    /* The "Clear" button gets a subtle warm tint on hover */
    #clearBtn:hover {
      background: rgba(216, 122, 110, 0.18);
      color: #f0c2bb;
    }

    /* Shape stamps: same button look as .tool, but draggable and no "active" state */
    .shape {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: #c9cdc6;
      cursor: grab;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .shape:hover {
      background: rgba(236, 235, 227, 0.08);
      color: #ecebe3;
    }
    .shape:active {
      cursor: grabbing;
    }
    .shape svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>

  <!-- The full-screen drawing surface -->
  <canvas id="board"></canvas>

  <!-- The only UI: pencil, eraser, clear -->
  <div id="toolbar">
    <button class="tool active" id="pencilBtn" title="Pencil">
      <!-- pencil icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </svg>
    </button>

    <button class="tool" id="eraserBtn" title="Eraser">
      <!-- eraser icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 16 13 6a2 2 0 0 1 2.8 0l3.2 3.2a2 2 0 0 1 0 2.8L13 18H7Z" />
        <path d="M22 20H7" />
      </svg>
    </button>

    <button class="tool" id="textBtn" title="Text (click to place caret, then type)">
      <!-- text icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 6V4h14v2" />
        <path d="M12 4v16" />
        <path d="M9 20h6" />
      </svg>
    </button>

    <button class="shape" data-shape="square" draggable="true" title="Drag onto board">
      <!-- square stamp -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="1" />
      </svg>
    </button>

    <button class="shape" data-shape="circle" draggable="true" title="Drag onto board">
      <!-- circle stamp -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8" />
      </svg>
    </button>

    <button class="tool" id="undoBtn" title="Undo last step">
      <!-- undo (curved arrow) icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 14 4 9l5-5" />
        <path d="M4 9h11a5 5 0 0 1 0 10h-4" />
      </svg>
    </button>

    <button class="tool" id="clearBtn" title="Clear board">
      <!-- trash icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18" />
        <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" />
        <path d="M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6" />
        <path d="M10 11v6M14 11v6" />
      </svg>
    </button>
  </div>

  <script>
    /* ============================================================
       4. SETUP
       ============================================================ */
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");

    // Fixed pencil settings (no color picker, no thickness slider)
    const CHALK_COLOR = "#ecebe3";  // warm chalk white
    const PENCIL_SIZE = 3.5;        // pencil thickness
    const ERASER_SIZE = 42;         // eraser thickness (square "cube" eraser)
    const STAMP_SIZE  = 60;         // dropped shape size (px)
    const STAMP_LINE  = 3;          // dropped shape outline thickness
    const UNDO_LIMIT  = 20;         // max number of undo snapshots kept
    const TEXT_SIZE   = 26;         // text-tool font size (px)
    const TEXT_FONT   = `${TEXT_SIZE}px sans-serif`;
    const LINE_HEIGHT = TEXT_SIZE * 1.3;

    let currentTool = "pencil";     // "pencil", "eraser", or "text"
    let drawing = false;            // is the mouse currently held down?
    let lastX = 0, lastY = 0;       // last known pointer position
    const historyStack = [];        // snapshots taken before each action

    // Text-tool state: when the user clicks with the text tool, a caret is
    // "placed" on the board and subsequent keystrokes are rendered from there.
    let textActive   = false;       // is a text caret currently placed?
    let textBaseSnap = null;        // canvas snapshot at the moment the caret was placed
    let textStartX   = 0;
    let textStartY   = 0;
    let textBuffer   = "";          // characters typed since the caret was placed

    /* ============================================================
       5. CANVAS SIZING (and crisp rendering on high-DPI screens)
       The canvas is resized to fill the window. We scale by the
       device pixel ratio so lines look sharp, then keep drawing in
       simple CSS pixel coordinates. Existing art is preserved.
       ============================================================ */
    function resizeCanvas() {
      // If the user is mid-typing, bake the text into the canvas first so it
      // survives the resize (and so textBaseSnap from the old size is dropped).
      commitText();

      // Take a snapshot of whatever is currently drawn
      const snapshot = document.createElement("canvas");
      snapshot.width = canvas.width;
      snapshot.height = canvas.height;
      snapshot.getContext("2d").drawImage(canvas, 0, 0);

      // Resize the real canvas to the window, accounting for screen density
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;

      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";

      // From now on, 1 unit = 1 CSS pixel (the dpr scaling is automatic)
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Paint the old drawing back, stretched to the new size
      ctx.drawImage(snapshot, 0, 0, snapshot.width, snapshot.height, 0, 0, w, h);

      // Old undo snapshots were sized to the previous backing store; drop them
      // so we never try to putImageData a wrong-sized blob into the new canvas.
      historyStack.length = 0;

      applyBrush(); // re-apply tool settings (they reset on resize)
    }

    /* ============================================================
       6. BRUSH SETTINGS
       Configures the context for the active tool.
       - Pencil:  draws chalk on top of the board.
       - Eraser:  "destination-out" removes pixels, revealing the
                  dark board background underneath (true erasing).
       ============================================================ */
    function applyBrush() {
      ctx.lineCap = "round";   // rounded stroke ends = smooth feel
      ctx.lineJoin = "round";  // rounded corners between segments

      if (currentTool === "pencil") {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = CHALK_COLOR;
        ctx.fillStyle = CHALK_COLOR;
        ctx.lineWidth = PENCIL_SIZE;
      } else {
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = ERASER_SIZE;
      }
    }

    /* ============================================================
       7. DRAWING LOGIC
       Smoothing trick: instead of straight lines between raw points
       (which look jagged on fast strokes), we draw quadratic curves
       through the midpoints of each pair of points. This is cheap,
       fast, and makes freehand drawing feel natural.
       ============================================================ */
    function startDraw(e) {
      // Text tool: clicks place a caret rather than starting a stroke.
      if (currentTool === "text") {
        placeCaret(e.offsetX, e.offsetY);
        return;
      }

      drawing = true;
      pushHistory();        // snapshot BEFORE this stroke, for undo
      applyBrush();

      lastX = e.offsetX;
      lastY = e.offsetY;

      // Draw a small dot so a single click/tap leaves a mark
      ctx.beginPath();
      ctx.arc(lastX, lastY, ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.fill();

      // Begin the continuous stroke from this point
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
    }

    function draw(e) {
      if (!drawing) return;

      const x = e.offsetX;
      const y = e.offsetY;

      // Midpoint between the last point and the current point
      const midX = (lastX + x) / 2;
      const midY = (lastY + y) / 2;

      // Curve smoothly toward the midpoint, using the last point as the bend
      ctx.quadraticCurveTo(lastX, lastY, midX, midY);
      ctx.stroke();

      // Continue the path from the midpoint for the next segment
      ctx.beginPath();
      ctx.moveTo(midX, midY);

      lastX = x;
      lastY = y;
    }

    function stopDraw() {
      drawing = false;
    }

    /* ============================================================
       8. TOOL SWITCHING + CLEAR
       ============================================================ */
    const pencilBtn = document.getElementById("pencilBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const textBtn   = document.getElementById("textBtn");
    const clearBtn  = document.getElementById("clearBtn");

    function selectTool(tool) {
      // Switching tools ends any in-progress text session (text stays on the board).
      commitText();
      currentTool = tool;
      // Update which button looks "active"
      pencilBtn.classList.toggle("active", tool === "pencil");
      eraserBtn.classList.toggle("active", tool === "eraser");
      textBtn.classList.toggle("active", tool === "text");
      // Cursor: I-beam for text tool, crosshair for the drawing tools.
      canvas.style.cursor = tool === "text" ? "text" : "crosshair";
    }

    pencilBtn.addEventListener("click", () => selectTool("pencil"));
    eraserBtn.addEventListener("click", () => selectTool("eraser"));
    textBtn.addEventListener("click", () => selectTool("text"));

    // Clear Board: wipe everything back to the empty chalkboard
    clearBtn.addEventListener("click", () => {
      commitText();         // bake any in-progress text in before clearing
      pushHistory();        // so "undo" can restore the board after a clear
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    });

    // Undo button: restore the snapshot taken before the last action
    const undoBtn = document.getElementById("undoBtn");
    undoBtn.addEventListener("click", () => {
      commitText();
      undo();
    });

    /* ============================================================
       9. EVENT WIRING
       Pointer events cover mouse (and pen/touch as a bonus) with
       low latency. Listening on the window for move/up means a
       stroke won't break if the cursor briefly leaves the canvas.
       ============================================================ */
    canvas.addEventListener("pointerdown", startDraw);
    window.addEventListener("pointermove", draw);
    window.addEventListener("pointerup", stopDraw);

    window.addEventListener("resize", resizeCanvas);

    /* ============================================================
       10. SHAPE STAMPS (drag from toolbar, drop on board)
       The toolbar buttons with class "shape" are HTML5 drag sources.
       The canvas is a drop target; on drop, we stamp the chosen
       shape (square or circle) centered on the drop point, in chalk.
       save()/restore() keeps the user's current brush state intact.
       ============================================================ */
    function stampShape(shape, x, y) {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = CHALK_COLOR;
      ctx.lineWidth = STAMP_LINE;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (shape === "square") {
        const half = STAMP_SIZE / 2;
        ctx.strokeRect(x - half, y - half, STAMP_SIZE, STAMP_SIZE);
      } else if (shape === "circle") {
        ctx.beginPath();
        ctx.arc(x, y, STAMP_SIZE / 2, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    document.querySelectorAll(".shape").forEach((btn) => {
      btn.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/shape", btn.dataset.shape);
        e.dataTransfer.effectAllowed = "copy";
      });
    });

    canvas.addEventListener("dragover", (e) => {
      // Must preventDefault here, otherwise "drop" never fires
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    });

    canvas.addEventListener("drop", (e) => {
      e.preventDefault();
      const shape = e.dataTransfer.getData("text/shape");
      if (shape) {
        commitText();     // bake any in-progress text into the canvas first
        pushHistory();    // snapshot BEFORE the stamp, for undo
        stampShape(shape, e.offsetX, e.offsetY);
      }
    });

    /* ============================================================
       11. UNDO HISTORY
       Snapshot-based undo: pushHistory() is called BEFORE any change
       (stroke, stamp, clear). undo() pops the last snapshot and
       restores it. Snapshots are full-canvas ImageData in device
       pixels — putImageData ignores the ctx transform, which is
       exactly what we want here.
       ============================================================ */
    function pushHistory() {
      historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (historyStack.length > UNDO_LIMIT) historyStack.shift();
    }

    function undo() {
      const snap = historyStack.pop();
      if (snap) ctx.putImageData(snap, 0, 0);
    }

    /* ============================================================
       12. TEXT INPUT
       The text tool places a caret on the board; subsequent keystrokes
       are drawn from that caret. The trick: we snapshot the canvas
       when the caret is placed, then on each keystroke restore that
       snapshot and re-render the whole text buffer. This makes
       Backspace trivial (drop the last char, redraw) and leaves the
       rest of the board untouched.
       ============================================================ */
    function renderText(showCaret) {
      if (!textBaseSnap) return;
      // putImageData ignores the dpr transform — exactly what we want for
      // pixel-perfect restoration of the pre-text canvas state.
      ctx.putImageData(textBaseSnap, 0, 0);

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = CHALK_COLOR;
      ctx.font = TEXT_FONT;
      ctx.textBaseline = "top";

      const lines = textBuffer.split("\n");
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], textStartX, textStartY + i * LINE_HEIGHT);
      }

      if (showCaret) {
        const lastLine = lines[lines.length - 1];
        const caretX = textStartX + ctx.measureText(lastLine).width;
        const caretY = textStartY + (lines.length - 1) * LINE_HEIGHT;
        ctx.fillRect(caretX, caretY, 2, TEXT_SIZE);
      }
      ctx.restore();
    }

    function placeCaret(x, y) {
      // Clicking again finishes any prior text session before starting a new one.
      commitText();
      pushHistory();   // one undo step covers this whole text entry
      textBaseSnap = ctx.getImageData(0, 0, canvas.width, canvas.height);
      textStartX = x;
      textStartY = y;
      textBuffer = "";
      textActive = true;
      renderText(true);
    }

    function commitText() {
      if (!textActive) return;
      // Re-render without the caret indicator so it isn't baked into the canvas.
      renderText(false);
      textActive = false;
      textBaseSnap = null;
      textBuffer = "";
    }

    window.addEventListener("keydown", (e) => {
      if (!textActive) return;

      if (e.key === "Escape") {
        // Cancel: restore the pre-caret board and pop the unused undo snapshot
        // so this aborted entry doesn't become an undo step.
        ctx.putImageData(textBaseSnap, 0, 0);
        historyStack.pop();
        textActive = false;
        textBaseSnap = null;
        textBuffer = "";
        e.preventDefault();
        return;
      }

      if (e.key === "Backspace") {
        if (textBuffer.length > 0) {
          textBuffer = textBuffer.slice(0, -1);
          renderText(true);
        }
        e.preventDefault();
        return;
      }

      if (e.key === "Enter") {
        textBuffer += "\n";
        renderText(true);
        e.preventDefault();
        return;
      }

      // Only accept printable single-character keys; ignore Ctrl/Cmd/Alt combos
      // so browser shortcuts still work.
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        textBuffer += e.key;
        renderText(true);
        e.preventDefault();
      }
    });

    // Kick everything off
    resizeCanvas();
  </script>
</body>
</html>
